name: Update gold spot price

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch spot price
        env:
          TWELVEDATA_KEY: ${{ secrets.TWELVEDATA_KEY }}
        run: python3 fetch_spot.py

      - name: Commit and push if changed
        run: |
          git config user.name "spot-bot"
          git config user.email "actions@users.noreply.github.com"
          git add spot.json
          git diff --staged --quiet || git commit -m "Update spot price"
          git push
